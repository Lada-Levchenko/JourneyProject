name: build-and-stage

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image vars
        id: image_vars
        shell: powershell
        run: |
          $owner = "${{ github.repository_owner }}".ToLowerInvariant()
          "OWNER_LC=$owner" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "TAG=sha-$env:GITHUB_SHA" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build API image
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          docker build --target prod -f apps/api/Dockerfile.prod --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" -t ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }} .

      - name: Push API image
        shell: powershell
        run: |
          docker push ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }}

      - name: Build Payments image
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          docker build --target prod -f apps/payments/Dockerfile.prod --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" -t ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-payments:${{ steps.image_vars.outputs.TAG }} .

      - name: Push Payments image
        shell: powershell
        run: |
          docker push ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-payments:${{ steps.image_vars.outputs.TAG }}

      - name: Create release manifest
        shell: powershell
        run: |
          $manifest = @"
          {
            "commit": "${{ github.sha }}",
            "services": {
              "api": {
                "image": "ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }}"
              },
              "worker": {
                "image": "ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }}"
              },
              "payments": {
                "image": "ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-payments:${{ steps.image_vars.outputs.TAG }}"
              }
            }
          }
          "@

          $Utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("$PWD\release-manifest.json", $manifest, $Utf8NoBom)

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy-stage:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: stage

    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: .

      - name: Parse manifest
        id: manifest
        shell: bash
        run: |
          IMAGE_TAG=$(python3 - <<'PY'
          import json
          with open('release-manifest.json', 'r', encoding='utf-8-sig') as f:
              data = json.load(f)
          print(data['services']['api']['image'].split(':')[-1])
          PY
          )
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy stage
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.STAGE_APP_DIR }}"

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ steps.manifest.outputs.IMAGE_TAG }}/" .env
            else
              echo "IMAGE_TAG=${{ steps.manifest.outputs.IMAGE_TAG }}" >> .env
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker compose -f compose.deploy.yml --profile infra up -d
            docker compose -f compose.deploy.yml --profile jobs run --rm migrate
            docker compose -f compose.deploy.yml --profile app up -d
            docker compose -f compose.deploy.yml ps

      - name: Smoke test stage API
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -e
            for i in $(seq 1 15); do
              if curl --fail --silent http://127.0.0.1:3015/api/health; then
                echo "Smoke test passed"
                exit 0
              fi
              echo "Attempt $i failed, waiting..."
              sleep 5
            done

            echo "Smoke test failed"
            cd "${{ secrets.STAGE_APP_DIR }}"
            docker compose -f compose.deploy.yml ps
            docker compose -f compose.deploy.yml logs --tail=100 api
            exit 1
