name: build-and-stage

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image vars
        id: image_vars
        shell: powershell
        run: |
          $owner = "${{ github.repository_owner }}".ToLowerInvariant()
          "OWNER_LC=$owner" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "TAG=sha-$env:GITHUB_SHA" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build API image
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          docker build -f apps/api/Dockerfile.prod --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" -t ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }} .

      - name: Push API image
        shell: powershell
        run: |
          docker push ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }}

      - name: Build Payments image
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          docker build -f apps/payments/Dockerfile.prod --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" -t ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-payments:${{ steps.image_vars.outputs.TAG }} .

      - name: Push Payments image
        shell: powershell
        run: |
          docker push ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-payments:${{ steps.image_vars.outputs.TAG }}

      - name: Create release manifest
        shell: powershell
        run: |
          $manifest = @"
          {
            "commit": "${{ github.sha }}",
            "services": {
              "api": {
                "image": "ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }}"
              },
              "worker": {
                "image": "ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-api:${{ steps.image_vars.outputs.TAG }}"
              },
              "payments": {
                "image": "ghcr.io/${{ steps.image_vars.outputs.OWNER_LC }}/journeyproject-payments:${{ steps.image_vars.outputs.TAG }}"
              }
            }
          }
          "@
          $manifest | Out-File -FilePath release-manifest.json -Encoding utf8

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy-stage:
    needs: build
    runs-on: self-hosted
    environment:
      name: stage

    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: .

      - name: Parse manifest
        id: manifest
        shell: powershell
        run: |
          $json = Get-Content release-manifest.json -Raw | ConvertFrom-Json
          $apiImage = $json.services.api.image
          $tag = $apiImage.Split(":")[-1]
          "IMAGE_TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Deploy to stage via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGE_APP_DIR }}

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ steps.manifest.outputs.IMAGE_TAG }}/" .env
            else
              echo "IMAGE_TAG=${{ steps.manifest.outputs.IMAGE_TAG }}" >> .env
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f compose.deploy.yml pull
            docker compose -f compose.deploy.yml up -d
            docker compose -f compose.deploy.yml ps

      - name: Smoke test stage API
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -e
            curl --fail --retry 10 --retry-delay 5 http://127.0.0.1:3015/health
