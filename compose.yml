services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
      target: prod
    env_file:
      - ./apps/api/.env.production
    environment:
      NODE_ENV: production
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      PORT: 3015
    ports:
      - "${API_PORT:-3015}:3015"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - internal
      - public

  api-distroless:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
      target: prod-distroless
    env_file:
      - ./apps/api/.env.production
    environment:
      NODE_ENV: production
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      PORT: 3015
    ports:
      - "${API_DISTROLESS_PORT:-3016}:3015"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - internal
      - public
    profiles: ["distroless"]

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
      target: jobs
    env_file:
      - ./apps/api/.env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:migrate", "--workspace=api"]
    networks:
      - internal
    restart: "no"
    profiles: ["tools"]

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
      target: jobs
    env_file:
      - ./apps/api/.env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:seed", "--workspace=api"]
    networks:
      - internal
    restart: "no"
    profiles: ["tools"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio:/data
    networks:
      - internal
      - public

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local ${AWS_S3_ENDPOINT} ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${AWS_S3_BUCKET:-lesson9-files-private};
      mc anonymous set none local/${AWS_S3_BUCKET:-lesson9-files-private};
      echo 'minio bucket is ready';
      "
    networks:
      - internal

volumes:
  pgdata:
  minio:

networks:
  internal:
    internal: true
  public:
