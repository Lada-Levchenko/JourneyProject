apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: stage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: ghcr.io/placeholder/journeyproject-payments:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
          env:
            - name: NODE_ENV
              value: stage
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 25
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
