apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/placeholder/journeyproject-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: stage
          readinessProbe:
            httpGet:
              path: api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
